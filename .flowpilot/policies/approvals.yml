approvals:
  requiredFor:
    - gitCommit
    - gitPush
    - gitCheckoutWithDirtyTree
    - createGitLabIssue
    - updateGitLabIssue
    - createGitLabMergeRequest
    - postGitLabComment
    - runDataQuery
  blockedActions:
    - gitResetHard
    - gitClean
    - gitForcePush
    - deleteRemoteBranch
    - productionDataWrite
