  - developer
  - tester
  - tech-lead
inputs:
  - git.status
  - git.diff
  - gitlab.mergeRequest
  - knowledge.definitionOfDone
ai:
  enabled: false
outputs:
  - missingAcceptanceCriteria
  - missingTests
  - missingDocumentation
  - pipelineState
  - approvalReadiness
